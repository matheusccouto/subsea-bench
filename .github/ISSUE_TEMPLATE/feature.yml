name: Feature
description: Propose a new feature or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What does this feature do?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed?
    validations:
      required: false
  - type: textarea
    id: files-owned
    attributes:
      label: Files owned
      description: Every file this issue will create or modify. Do not touch files outside this list.
      value: |
        src/subsea_bench/
        tests/unit/
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
        - [ ]
    validations:
      required: false
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Issues that must merge before this one starts.
      value: "Blocked by: #"
    validations:
      required: false
