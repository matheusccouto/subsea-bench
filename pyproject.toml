[project]
name = "subsea-bench"
version = "0.1.0"
description = "Subsea mooring system benchmarks and validation tools"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "moorpy>=0.9.1",
    "numpy>=1.26",
    "matplotlib>=3.8",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

